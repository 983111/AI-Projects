name = "voice-os"
main = "worker/worker.js"
compatibility_date = "2024-09-23"

[vars]
MAX_DAILY_TOKENS = "100"
SOS_NOTIFICATION_URL = ""

# ⚠️  SECRETS — do NOT put real values here.
# Instead run these commands to set them securely:
#
#   wrangler secret put JWT_SECRET
#   wrangler secret put GROQ_API_KEY
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_KEY
#
# For local dev only (never commit this file with real values):
# create a .dev.vars file in the same folder:
#
#   JWT_SECRET=your-local-secret
#   GROQ_API_KEY=sk-...
#   SUPABASE_URL=https://xxxx.supabase.co
#   SUPABASE_SERVICE_KEY=eyJ...
